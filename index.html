<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONO: Work in Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    body { 
        font-family: 'Inter', sans-serif; 
        /* Here is where we set picture 1 as the background */
        background-image: url('bg-mono.png.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #fcfcfc;
    }
    
    .editorial-font { font-family: 'Playfair Display', serif; }
    
    /* This creates the Y-axis spinning logic */
    @keyframes spin-y {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    
    .animate-spin-y {
      /* Change '4s' to a higher number if you want it to spin slower */
      animation: spin-y 4s linear infinite;
    }
    
    /* This darkens the background image slightly so the text is easy to read */
    .overlay {
        background-color: rgba(0, 0, 0, 0.4);
        min-height: 100vh;
    }
  </style>
</head>
<body class="antialiased">

  <!-- A full-screen container that centers everything -->
  <div class="overlay flex flex-col items-center justify-center text-center p-8">
     
     <!-- Picture 2: The Spinning Logo -->
     <!-- Ensure this src matches your renamed logo file exactly -->
     <img src="logo-2.png.png" alt="MONO Logo" class="h-48 md:h-64 object-contain animate-spin-y mb-12 shadow-2xl rounded-sm">
     
     <!-- The Text -->
     <h1 class="text-5xl md:text-7xl font-bold mb-4 editorial-font tracking-widest uppercase">Work in Progress</h1>
     <p class="text-lg md:text-xl text-yellow-500 font-medium tracking-widest uppercase mt-4">MONO: Traces of Coexistence</p>
  </div>

</body>
</html>
